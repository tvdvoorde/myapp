on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'The target environment'
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prd

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true

name: app
run-name: app | deploy | ${{ github.event.inputs.environment || 'dev' }} | ${{ github.ref_name }}

jobs:
  deploy-to-azure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load environment variables
        run: |
          cat env/generic.env >> "$GITHUB_ENV"
          cat "env/${{ github.event.inputs.environment || 'dev' }}.env" >> "$GITHUB_ENV"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Build deployment zip
        run: |
          rm -rf deploy release.zip
          mkdir deploy
          cp requirements.txt deploy/
          cp -R app/. deploy/
          cd deploy
          zip -r ../release.zip .

      - name: Enable build during deployment
        run: |
          az webapp config appsettings set \
            --resource-group "${{ env.RESOURCE_GROUP_NAME }}" \
            --name "${{ env.WEB_APP_NAME }}" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Zip deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group "${{ env.RESOURCE_GROUP_NAME }}" \
            --name "${{ env.WEB_APP_NAME }}" \
            --src-path release.zip \
            --type zip \
            --clean true
