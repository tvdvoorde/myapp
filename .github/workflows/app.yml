
on:
  # push:
  #   branches:
  #     - main
  #   paths-ignore:
  #     - '**.md'
  #     - '**.MD'
  workflow_dispatch:
    inputs:
      environment:
        description: 'The target environment'
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prd
      action:
        description: 'Action'
        required: true
        default: deploy
        type: choice
        options:
          - test
          - deploy

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true

name: app
run-name: app | ${{ github.event.inputs.action || 'deploy'}} | ${{ github.event.inputs.environment || 'dev' }} | ${{ github.ref_name }}


jobs:
  test-application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt pytest

      - name: Run tests
        run: |
          cd app
          python -m pytest test_app.py -v

  deploy-to-azure:
    needs: test-application
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    if: github.event.inputs.action == 'deploy' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: 'Load environment variables'
        run: |
          cat env/generic.env >>$GITHUB_ENV
          cat env/${{ github.event.inputs.environment || 'dev' }}.env >>$GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Configure app settings
        run: |
          az webapp config appsettings set \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --name ${{ env.WEB_APP_NAME }} \
            --settings TF_VAR_environment=${{ env.TF_VAR_environment }}

      - name: Create deployment package
        run: |
          cd app
          zip -r ../deployment.zip . -x "*.pyc" "__pycache__/*" "*.log"

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --name ${{ env.WEB_APP_NAME }} \
            --src-path deployment.zip \
            --type zip

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30

          APP_URL="https://${{ env.WEB_APP_NAME }}.azurewebsites.net"
          echo "Testing deployed application at: $APP_URL"

          for i in {1..10}; do
            if curl -f "$APP_URL/health" > /dev/null 2>&1; then
              echo "✅ Deployed application is responding!"
              break
            fi
            echo "Attempt $i: Deployment not ready yet, waiting..."
            sleep 10
          done

          echo "✅ Deployment verification completed successfully!"